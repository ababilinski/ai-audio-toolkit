name: Build Windows app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows bundle
    runs-on: windows-latest
    timeout-minutes: 360

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUTF8: "1"
      SAM_AUDIO_COMMIT: "68b48d48fff1ad776d3afefbe634eb5f5d60ba7b"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show free disk space
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem

      - name: Install FFmpeg
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Create virtual environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel

      - name: Install base runtime
        shell: pwsh
        run: |
          function Invoke-PipInstall {
            param([Parameter(ValueFromRemainingArguments = $true)][string[]] $Packages)
            & .\.venv\Scripts\python.exe -m pip install @Packages
            if ($LASTEXITCODE -ne 0) {
              throw "pip install failed: $($Packages -join ' ')"
            }
          }

          Invoke-PipInstall `
            torch torchaudio torchvision `
            --index-url https://download.pytorch.org/whl/cu126

          Invoke-PipInstall `
            -r requirements.txt `
            --extra-index-url https://download.pytorch.org/whl/cu126
          Invoke-PipInstall pyinstaller

      - name: Install full engine set
        shell: pwsh
        run: |
          function Invoke-PipInstall {
            param([Parameter(ValueFromRemainingArguments = $true)][string[]] $Packages)
            & .\.venv\Scripts\python.exe -m pip install @Packages
            if ($LASTEXITCODE -ne 0) {
              throw "pip install failed: $($Packages -join ' ')"
            }
          }

          Invoke-PipInstall voicefixer speechbrain
          Invoke-PipInstall "git+https://github.com/facebookresearch/sam-audio.git@$env:SAM_AUDIO_COMMIT"

          # Install optional runtime helpers before the packages with conflicting metadata.
          Invoke-PipInstall `
            celluloid omegaconf pandas ptflops rich resampy tabulate `
            gdown opencv-python python_speech_features scenedetect torchinfo yamlargparse `
            deepfilterlib==0.5.6 loguru appdirs win32-setctime

          # These packages declare dependency pins that conflict with the shared runtime:
          #   - audio-separator requires numpy >= 2
          #   - DeepFilterNet/ClearVoice/Resemble-Enhance declare numpy < 2
          # Installing them with dependencies lets pip downgrade/upgrade numpy and packaging
          # mid-build. Install them last without dependencies so the bundle keeps one shared
          # ML runtime, like the known-good local build.
          Invoke-PipInstall deepfilternet==0.5.6 resemble-enhance clearvoice --no-deps

      - name: Verify engine packages are present
        shell: pwsh
        run: |
          @'
          import importlib.util
          from importlib import metadata
          from packaging.version import Version

          required = [
              "audio-separator",
              "deepfilternet",
              "deepfilterlib",
              "resemble-enhance",
              "clearvoice",
              "voicefixer",
              "speechbrain",
              "sam_audio",
          ]
          missing = []
          for package in required:
              try:
                  print(f"{package}: {metadata.version(package)}")
              except metadata.PackageNotFoundError:
                  missing.append(package)

          if missing:
              raise SystemExit(f"Missing required build packages: {', '.join(missing)}")

          if importlib.util.find_spec("sam_audio") is None:
              raise SystemExit("SAM-Audio module is not importable: sam_audio")
          print("sam_audio module: present")

          numpy_version = Version(metadata.version("numpy"))
          packaging_version = Version(metadata.version("packaging"))
          if numpy_version < Version("2"):
              raise SystemExit(f"numpy was downgraded below 2.x: {numpy_version}")
          if packaging_version < Version("24"):
              raise SystemExit(f"packaging was downgraded below 24.x: {packaging_version}")
          print(f"numpy: {numpy_version}")
          print(f"packaging: {packaging_version}")
          '@ | .\.venv\Scripts\python.exe -

      - name: Compile Python sources
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m compileall audio_editor scripts build_bundle.py run.py

      - name: Build Windows bundle
        shell: pwsh
        run: .\.venv\Scripts\python.exe build_bundle.py

      - name: Verify launcher exists
        shell: pwsh
        run: |
          $exe = "build\windows_bundle\ai-audio-toolkit\ai-audio-toolkit.exe"
          if (!(Test-Path $exe)) {
            throw "Launcher was not created: $exe"
          }
          Get-Item $exe | Format-List FullName,Length,LastWriteTime

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: ai-audio-toolkit-windows
          path: build/windows_bundle/ai-audio-toolkit/**
          compression-level: 0
          retention-days: 14
