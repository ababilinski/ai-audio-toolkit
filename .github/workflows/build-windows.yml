name: Build Windows app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows bundle
    runs-on: windows-latest
    timeout-minutes: 360

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUTF8: "1"
      SAM_AUDIO_COMMIT: "68b48d48fff1ad776d3afefbe634eb5f5d60ba7b"
      RELEASE_VERSION: "1"
      RELEASE_TAG: "v1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show free disk space
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem

      - name: Install FFmpeg and release tools
        shell: pwsh
        run: choco install ffmpeg 7zip -y --no-progress

      - name: Create virtual environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel

      - name: Install base runtime
        shell: pwsh
        run: |
          function Invoke-PipInstall {
            param([Parameter(ValueFromRemainingArguments = $true)][string[]] $Packages)
            & .\.venv\Scripts\python.exe -m pip install @Packages
            if ($LASTEXITCODE -ne 0) {
              throw "pip install failed: $($Packages -join ' ')"
            }
          }

          Invoke-PipInstall `
            torch torchaudio torchvision `
            --index-url https://download.pytorch.org/whl/cu126

          Invoke-PipInstall `
            -r requirements.txt `
            --extra-index-url https://download.pytorch.org/whl/cu126
          Invoke-PipInstall pyinstaller

      - name: Install full engine set
        shell: pwsh
        run: |
          function Invoke-PipInstall {
            param([Parameter(ValueFromRemainingArguments = $true)][string[]] $Packages)
            & .\.venv\Scripts\python.exe -m pip install @Packages
            if ($LASTEXITCODE -ne 0) {
              throw "pip install failed: $($Packages -join ' ')"
            }
          }

          Invoke-PipInstall deepfilternet
          Invoke-PipInstall voicefixer speechbrain
          Invoke-PipInstall "git+https://github.com/facebookresearch/sam-audio.git@$env:SAM_AUDIO_COMMIT"

          # These two packages pin or downgrade shared ML dependencies when installed normally.
          # The app carries compatibility patches/stubs for their inference paths, so install
          # their runtime helpers explicitly and then install the packages without dependencies.
          Invoke-PipInstall `
            celluloid omegaconf pandas ptflops rich resampy tabulate `
            gdown opencv-python python_speech_features scenedetect torchinfo yamlargparse
          Invoke-PipInstall resemble-enhance --no-deps
          Invoke-PipInstall clearvoice --no-deps

      - name: Verify engine packages are present
        shell: pwsh
        run: |
          @'
          import importlib.util
          from importlib import metadata

          required = [
              "audio-separator",
              "deepfilternet",
              "resemble-enhance",
              "clearvoice",
              "voicefixer",
              "speechbrain",
              "sam_audio",
          ]
          missing = []
          for package in required:
              try:
                  print(f"{package}: {metadata.version(package)}")
              except metadata.PackageNotFoundError:
                  missing.append(package)

          if missing:
              raise SystemExit(f"Missing required build packages: {', '.join(missing)}")

          if importlib.util.find_spec("sam_audio") is None:
              raise SystemExit("SAM-Audio module is not importable: sam_audio")
          print("sam_audio module: present")
          '@ | .\.venv\Scripts\python.exe -

      - name: Compile Python sources
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m compileall audio_editor scripts build_bundle.py run.py

      - name: Build Windows bundle
        shell: pwsh
        run: .\.venv\Scripts\python.exe build_bundle.py

      - name: Verify launcher exists
        shell: pwsh
        run: |
          $exe = "build\windows_bundle\ai-audio-toolkit\ai-audio-toolkit.exe"
          if (!(Test-Path $exe)) {
            throw "Launcher was not created: $exe"
          }
          Get-Item $exe | Format-List FullName,Length,LastWriteTime

      - name: Package release bundle
        shell: pwsh
        run: |
          $releaseDir = "build\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $archiveBase = "$releaseDir\ai-audio-toolkit-v$env:RELEASE_VERSION-windows.7z"
          if (Test-Path "$archiveBase.*") {
            Remove-Item "$archiveBase.*" -Force
          }
          7z a -t7z -mx=3 -v1900m $archiveBase ".\build\windows_bundle\ai-audio-toolkit"
          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip packaging failed."
          }
          Get-ChildItem $releaseDir | Format-Table Name,Length,LastWriteTime

      - name: Create GitHub release v1
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem "build\release\ai-audio-toolkit-v$env:RELEASE_VERSION-windows.7z.*" |
            Sort-Object Name |
            ForEach-Object { $_.FullName }
          if (!$assets) {
            throw "No release archives were created."
          }

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag
            if ($LASTEXITCODE -ne 0) {
              throw "Could not delete existing release $env:RELEASE_TAG."
            }
          }

          $notes = @"
          AI Audio Toolkit version $env:RELEASE_VERSION Windows build.

          Download every ai-audio-toolkit-v$env:RELEASE_VERSION-windows.7z.* file from this release.
          Open the .001 file with 7-Zip, or run:

              7z x ai-audio-toolkit-v$env:RELEASE_VERSION-windows.7z.001

          Then run:

              ai-audio-toolkit\ai-audio-toolkit.exe
          "@

          gh release create $env:RELEASE_TAG $assets `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "AI Audio Toolkit $env:RELEASE_VERSION" `
            --notes $notes
          if ($LASTEXITCODE -ne 0) {
            throw "Could not create release $env:RELEASE_TAG."
          }

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: ai-audio-toolkit-windows
          path: build/windows_bundle/ai-audio-toolkit/**
          compression-level: 0
          retention-days: 14
